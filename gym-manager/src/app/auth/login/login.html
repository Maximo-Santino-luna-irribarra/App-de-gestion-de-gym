<div class="min-h-screen bg-[#0f0f0f] flex items-center justify-center p-8">
    <div class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl w-full max-w-sm p-10">
        
        <h1 class="text-4xl font-black tracking-widest text-[#e5ff00] uppercase">
        Fitness club
        </h1>
        <p class="text-sm text-zinc-500 mt-1 mb-8">Panel de administración</p>

        <form (ngSubmit)="onLogin()">
        <div class="mb-5">
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">EMAIL</label>
            <input
            [(ngModel)]="email"
            name="email"
            type="email"
            placeholder="admin@gimnasio.com"
            class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"
            />
        </div>

        <div class="mb-2">
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">CONTRASEÑA</label>
            <input
            [(ngModel)]="password"
            name="password"
            type="password"
            placeholder="••••••••"
            class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"
            />
        </div>

        <div class="text-right mb-5">
            <a href="#" class="text-xs text-zinc-600 hover:text-[#e5ff00] transition-colors">
            ¿Olvidaste tu contraseña?
            </a>
        </div>
          <div class="text-right mb-5">
            <a href="registro" class="text-xs text-zinc-600 hover:text-[#e5ff00] transition-colors">
            Desea Registrarse ?
            </a>
        </div>

        <button
            type="submit"
            class="w-full bg-[#e5ff00] text-black font-medium rounded-lg py-3 text-sm hover:opacity-85 transition-opacity"
        >
            Ingresar
        </button>
        </form>

        <hr class="border-[#222] my-6" />
        <p class="text-xs text-zinc-700 text-center">Solo acceso para personal autorizado</p>
    </div>
</div>
