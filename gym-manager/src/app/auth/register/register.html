<div class="min-h-screen bg-[#0f0f0f] flex items-center justify-center p-8">
    <div class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl w-full max-w-md p-10">

    <h1 class="text-4xl font-black tracking-widest text-[#e5ff00] uppercase">Fitness club</h1>
    <p class="text-sm text-zinc-500 mt-1 mb-8">Registrar nuevo miembro</p>

    <form (ngSubmit)="onRegistrar()">

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">NOMBRE</label>
            <input [(ngModel)]="form.nombre" name="nombre" type="text" placeholder="Juan"
                class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"/>
            </div>
            <div>
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">APELLIDO</label>
            <input [(ngModel)]="form.apellido" name="apellido" type="text" placeholder="Pérez"
                class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"/>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">DNI</label>
            <input [(ngModel)]="form.dni" name="dni" type="text" placeholder="12345678"
                class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"/>
            </div>
            <div>
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">TELÉFONO</label>
            <input [(ngModel)]="form.telefono" name="telefono" type="tel" placeholder="1123456789"
                class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"/>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-xs text-zinc-500 tracking-widest mb-2">EMAIL</label>
            <input [(ngModel)]="form.email" name="email" type="email" placeholder="juan@email.com"
            class="w-full bg-[#111] border border-[#333] rounded-lg px-4 py-2.5 text-sm text-zinc-100 outline-none focus:border-[#e5ff00] transition-colors"/>
        </div>

        <button type="submit"
            class="w-full bg-[#e5ff00] text-black font-medium rounded-lg py-3 text-sm hover:opacity-85 transition-opacity">
            Registrar miembro
        </button>

        </form>

        <hr class="border-[#222] my-6" />
        <p class="text-xs text-zinc-600 text-center">
        ¿Ya tenés cuenta? 
        <a routerLink="/login" class="text-[#e5ff00] hover:opacity-75">Iniciá sesión</a>
        </p>
    </div>
</div>
